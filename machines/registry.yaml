# Machine Pool Registry
# Each machine entry describes its identity, access, specs, and tags.
# Tags drive dispatcher routing — add any tags that describe what the machine is good for.

machines:

  - id: home-4090
    label: "Home workstation — RTX 4090"
    host: localhost          # this machine itself
    user: openclaw
    ssh_key: null            # null = local execution
    sudo: true
    enabled: true
    tags:
      - gpu
      - high-vram
      - home
      - image-gen
      - training
    specs:
      gpu: "RTX 4090"
      vram_gb: 24
      cpu_cores: 16          # update with actual
      ram_gb: 64             # update with actual
      storage_gb: 2000       # update with actual
      os: linux
    location:
      region: home
      country: US
    notes: "Primary GPU box. Running flux-girl, home-monitor."

  - id: minipc
    label: "Mini PC — AMD Ryzen 9 7940HS"
    host: 172.28.195.237
    user: openclaw2
    ssh_key: ~/.ssh/id_machine_pool
    sudo: true
    enabled: true
    tags:
      - cpu
      - amd
      - home
      - igpu
      - lightweight
      - crawling
    specs:
      gpu: "AMD Radeon 780M (integrated)"
      vram_gb: 0
      cpu_cores: 16
      ram_gb: 29
      storage_gb: 466
      os: linux
    location:
      region: home
      country: US
    notes: "AMD Ryzen 9 7940HS, 16-core, 29GB RAM, 466GB NVMe. No discrete GPU. 120Mbps WAN. Connected via ZeroTier (172.28.195.237). Good for CPU tasks, crawling, data processing."

